server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/music_recommend?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: music-recommendation-system-jwt-secret-key-2026
  expiration: 86400000

logging:
  level:
    com.musicrec: debug
